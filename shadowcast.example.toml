# Shadowcast Player Configuration
# Copy to ~/.config/shadowcast-player/shadowcast.toml (Linux)
#         ~/Library/Application Support/shadowcast-player/shadowcast.toml (macOS)
#         %APPDATA%/shadowcast-player/shadowcast.toml (Windows)

[plugins.example-logger]
enabled = true

# Future plugins:
# [plugins.mcp-server]
# enabled = true
# port = 8080
# host = "127.0.0.1"
#
# [plugins.hid-emulator]
# enabled = false
# device = "/dev/ttyACM0"
#
# [plugins.stream-output]
# enabled = false
# url = "rtmp://live.example.com/stream"
