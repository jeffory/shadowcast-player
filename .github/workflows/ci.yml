name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    env:
      BINARY_NAME: shadowcast-player${{ matrix.os == 'windows-latest' && '.exe' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libv4l-dev \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            pkg-config \
            clang

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          $FFMPEG_ARCHIVE = "ffmpeg-release-full-shared.7z"
          $FFMPEG_URL = "https://www.gyan.dev/ffmpeg/builds/$FFMPEG_ARCHIVE"
          Invoke-WebRequest -Uri $FFMPEG_URL -OutFile $FFMPEG_ARCHIVE
          7z x $FFMPEG_ARCHIVE -o"$env:RUNNER_TEMP"
          $FFMPEG_DIR = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-*-full_build-shared" -Directory | Select-Object -First 1
          echo "FFMPEG_DIR=$FFMPEG_DIR" >> $env:GITHUB_ENV
          echo "$FFMPEG_DIR\bin" >> $env:GITHUB_PATH

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: shadowcast-player-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
