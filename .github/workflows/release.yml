name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build on the oldest supported Ubuntu so the bundled libs / AppImage
          # link against an older glibc and run on a wider range of distros.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: shadowcast-player-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: shadowcast-player-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: shadowcast-player-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-release-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libv4l-dev \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            pkg-config \
            clang \
            patchelf \
            file \
            desktop-file-utils \
            imagemagick

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          $FFMPEG_ARCHIVE = "ffmpeg-release-full-shared.7z"
          $FFMPEG_URL = "https://www.gyan.dev/ffmpeg/builds/$FFMPEG_ARCHIVE"
          Invoke-WebRequest -Uri $FFMPEG_URL -OutFile $FFMPEG_ARCHIVE
          7z x $FFMPEG_ARCHIVE -o"$env:RUNNER_TEMP"
          $FFMPEG_DIR = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-*-full_build-shared" -Directory | Select-Object -First 1
          echo "FFMPEG_DIR=$FFMPEG_DIR" >> $env:GITHUB_ENV
          echo "$FFMPEG_DIR\bin" >> $env:GITHUB_PATH

      - name: Build release binary
        # On Linux, embed an $ORIGIN-relative RPATH so the binary loads the
        # FFmpeg libraries bundled next to it (in ./lib) rather than the host's.
        # --disable-new-dtags emits DT_RPATH (not DT_RUNPATH) so the search path
        # also applies to FFmpeg's own transitive deps (codec libs like libx264).
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-arg=-Wl,-rpath,$ORIGIN/lib -C link-arg=-Wl,--disable-new-dtags' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.target }}/release/shadowcast-player
          mkdir -p staging/lib
          cp "$BIN" staging/

          # Bundle the FFmpeg shared libraries (and the codec libs they pull in)
          # so the binary runs on systems whose FFmpeg major version differs from
          # the build runner's. Seed from the libav*/libsw*/libpostproc* libs the
          # binary links, then walk their dependencies, skipping libraries every
          # Linux desktop already provides (libc, the X11/Wayland/GL display
          # stack, ALSA, VA-API) so we don't override the host's graphics/audio.
          # Matched against the library basename: skip if it starts with one of
          # these tokens followed by a '.' or '-' (so e.g. libX11-xcb.so is
          # skipped, but libmp3lame.so — which starts with "libm" — is not).
          skip='^(ld-linux|linux-vdso|libc|libm|libdl|libpthread|librt|libutil|libresolv|libgcc_s|libstdc\+\+|libX11|libxcb|libXau|libXdmcp|libXext|libXfixes|libwayland|libdrm|libGL|libGLX|libGLdispatch|libEGL|libgbm|libglapi|libasound|libva|libvdpau)[-.]'

          declare -A seen
          queue=()
          while read -r lib; do
            [ -n "$lib" ] && queue+=("$lib")
          done < <(ldd "$BIN" | awk '/=> \//{print $3}' | grep -E '/lib(av|sw|postproc)' || true)

          while [ ${#queue[@]} -gt 0 ]; do
            cur="${queue[0]}"; queue=("${queue[@]:1}")
            base=$(basename "$cur")
            if [ -n "${seen[$base]:-}" ]; then continue; fi
            seen[$base]=1
            if echo "$base" | grep -Eq "$skip"; then continue; fi
            cp -Lv "$cur" staging/lib/
            while read -r dep; do
              [ -n "$dep" ] && queue+=("$dep")
            done < <(ldd "$cur" 2>/dev/null | awk '/=> \//{print $3}')
          done

          echo "Bundled libraries:"; ls -1 staging/lib
          cd staging
          tar czf ../${{ matrix.artifact }}.tar.gz shadowcast-player lib

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          SRC_ICON=assets/shadowcast.png
          if [ ! -f "$SRC_ICON" ]; then
            echo "::error::AppImage icon not found at $SRC_ICON — add a square PNG named shadowcast.png under assets/."
            exit 1
          fi
          # Normalize to the standard AppImage icon size (icon name = 'shadowcast',
          # matching the desktop Icon= key below). Source art is left untouched.
          ICON=shadowcast.png
          convert "$SRC_ICON" -resize 256x256 "$ICON"

          # Fetch linuxdeploy + its AppImage plugin (self-contained AppImages).
          base=https://github.com/linuxdeploy
          curl -fsSL -o linuxdeploy "$base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl -fsSL -o linuxdeploy-plugin-appimage "$base/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-appimage
          # GitHub runners have no FUSE; run the AppImage tools via extraction.
          export APPIMAGE_EXTRACT_AND_RUN=1

          # Assemble the AppDir from the already-compiled binary (no rebuild).
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.target }}/release/shadowcast-player AppDir/usr/bin/

          # Build the .desktop entry line-by-line to avoid heredoc indentation.
          {
            echo "[Desktop Entry]"
            echo "Type=Application"
            echo "Name=ShadowCast Player"
            echo "Comment=Capture and record video from ShadowCast devices"
            echo "Exec=shadowcast-player"
            echo "Icon=shadowcast"
            echo "Categories=AudioVideo;Video;"
            echo "Terminal=false"
          } > shadowcast-player.desktop

          # Embed AppImage update information so updaters (GearLever,
          # AppImageUpdate) can pull new versions straight from GitHub releases.
          # The gh-releases-zsync transport tracks the 'latest' release and the
          # matching .zsync asset; providing it also makes the plugin emit that
          # .zsync file, which we upload alongside the AppImage.
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          export UPDATE_INFORMATION="gh-releases-zsync|${owner}|${repo}|latest|${{ matrix.artifact }}.AppImage.zsync"

          # linuxdeploy bundles the binary's shared-library closure (it ships its
          # own exclude list for the host graphics/driver stack) and emits the
          # AppImage. OUTPUT pins the final filename.
          OUTPUT=${{ matrix.artifact }}.AppImage ./linuxdeploy \
            --appdir AppDir \
            --executable AppDir/usr/bin/shadowcast-player \
            --desktop-file shadowcast-player.desktop \
            --icon-file "$ICON" \
            --output appimage

          # Both the AppImage and its update-feed .zsync must be present.
          ls -la ${{ matrix.artifact }}.AppImage ${{ matrix.artifact }}.AppImage.zsync

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/shadowcast-player staging/
          cd staging
          tar czf ../${{ matrix.artifact }}.tar.gz shadowcast-player

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target\${{ matrix.target }}\release\shadowcast-player.exe" staging\
          # Bundle FFmpeg DLLs needed at runtime
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" staging\
          Compress-Archive -Path staging\* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Windows) files=("$ARTIFACT.zip") ;;
            Linux)   files=("$ARTIFACT.tar.gz" "$ARTIFACT.AppImage" "$ARTIFACT.AppImage.zsync") ;;
            *)       files=("$ARTIFACT.tar.gz") ;;
          esac
          gh release upload "$TAG" "${files[@]}" --clobber
